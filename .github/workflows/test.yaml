name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Enable eatmydata for apt
      uses: firebuild/apt-eatmydata-action@v1

    - name: Setup Bats
      uses: bats-core/bats-action@3.0.1
      with:
        detik-install: false  # 未使用，且 1.3.2 tarball 下载损坏

    - name: Run Bats tests
      run: bats tests/*.bats
